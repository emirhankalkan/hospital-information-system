# ===========================
# Application
# ===========================
spring.application.name=his-backend
server.port=8080
spring.config.import=optional:file:.env[.properties]

# ===========================
# PostgreSQL DataSource
# ===========================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/his_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===========================
# JPA / Hibernate
# ===========================
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${HIBERNATE_FORMAT_SQL:false}
spring.jpa.open-in-view=false

# ===========================
# Flyway Database Migrations
# ===========================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false
spring.flyway.validate-on-migrate=true

# ===========================
# Logging
# ===========================
logging.level.com.his=${APP_LOG_LEVEL:INFO}
logging.level.org.springframework.security=${SECURITY_LOG_LEVEL:WARN}

# ===========================
# JWT Configuration
# ===========================
# 256-bit secret key for HMAC-SHA256 (Base64 Encoded)
his.jwt.secret=${JWT_SECRET:aYp2s8vD4gK9fX1mP4jL7wN0zB3sC6xV9aT2hN5yR8E=}
# Expiration: 24 hours (in milliseconds)
his.jwt.expiration=${JWT_EXPIRATION:86400000}
his.refresh-token.expiration=${REFRESH_TOKEN_EXPIRATION:604800000}
his.refresh-token.cleanup-enabled=${REFRESH_TOKEN_CLEANUP_ENABLED:true}
his.refresh-token.cleanup-initial-delay=${REFRESH_TOKEN_CLEANUP_INITIAL_DELAY:600000}
his.refresh-token.cleanup-fixed-delay=${REFRESH_TOKEN_CLEANUP_FIXED_DELAY:3600000}
his.account.email-verification-expiration=${EMAIL_VERIFICATION_EXPIRATION:86400000}
his.account.password-reset-expiration=${PASSWORD_RESET_EXPIRATION:900000}
his.app.base-url=${APP_BASE_URL:http://localhost:8080}

# ===========================
# CORS
# ===========================
his.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}

# ===========================
# Swagger / OpenAPI
# ===========================
springdoc.api-docs.enabled=${SWAGGER_ENABLED:true}
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:true}

# ===========================
# Mail
# ===========================
# Use "log" for local development without real e-mail, "smtp" for Gmail SMTP.
his.mail.provider=${MAIL_PROVIDER:log}
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
