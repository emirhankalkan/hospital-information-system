<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">
        <i class="pi pi-building-columns"></i>
      </div>
      <div class="auth-brand-label">Logo</div>
      <h1>Hospital Information System</h1>
      <div class="auth-section-title">Hasta Portalı</div>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
      <div class="auth-form-title">Giriş Yap</div>

      @if (errorMessage) {
        <p-message severity="error" [text]="errorMessage" styleClass="w-full" />
      }

      <div class="auth-field">
        <label for="email">E-posta Adresi</label>
        <input
          pInputText
          id="email"
          formControlName="email"
          type="email"
          class="auth-input"
          placeholder="E-posta adresinizi giriniz"
        />
      </div>

      <div class="auth-field">
        <label for="password">Şifre</label>
        <p-password
          id="password"
          formControlName="password"
          [toggleMask]="true"
          [feedback]="false"
          styleClass="auth-password"
          inputStyleClass="auth-input"
          placeholder="Şifrenizi giriniz"
        />
      </div>

      <div class="auth-options">
        <div class="remember-me">
          <p-checkbox formControlName="rememberMe" [binary]="true" inputId="remember" />
          <label for="remember">Beni Hatırla</label>
        </div>
        <a routerLink="/forgot-password" class="auth-link">Şifremi Unuttum</a>
      </div>

      <p-button
        label="Giriş Yap"
        [loading]="isLoading"
        type="submit"
        [disabled]="loginForm.invalid"
        styleClass="auth-submit"
      />

      <div class="auth-footer">
        Hesabınız yok mu?
        <a routerLink="/register" class="auth-link auth-link-strong">Kayıt Ol</a>
      </div>
    </form>
  </div>
</div>
