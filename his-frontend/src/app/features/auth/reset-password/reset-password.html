<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">
        <i class="pi pi-lock"></i>
      </div>
      <div class="auth-brand-label">Logo</div>
      <h1>Hospital Information System</h1>
      <div class="auth-section-title">Yeni Şifre Belirle</div>
    </div>

    <form [formGroup]="resetPasswordForm" (ngSubmit)="onSubmit()" class="auth-form">
      <p class="auth-help-text">
        E-postanıza gelen token ile yeni şifrenizi belirleyin. Token bağlantıdan geldiyse otomatik doldurulur.
      </p>

      @if (successMessage) {
        <p-message severity="success" [text]="successMessage" styleClass="w-full" />
      }

      @if (errorMessage) {
        <p-message severity="error" [text]="errorMessage" styleClass="w-full" />
      }

      <div class="auth-field">
        <label for="token">Sıfırlama Tokenı</label>
        <input
          pInputText
          id="token"
          formControlName="token"
          type="text"
          class="auth-input"
          placeholder="Maildeki tokenı giriniz"
        />
      </div>

      <div class="auth-field">
        <label for="newPassword">Yeni Şifre</label>
        <p-password
          id="newPassword"
          formControlName="newPassword"
          [toggleMask]="true"
          [feedback]="false"
          styleClass="auth-password"
          inputStyleClass="auth-input"
          placeholder="Yeni şifrenizi giriniz"
        />
      </div>

      <div class="auth-field">
        <label for="confirmPassword">Yeni Şifre Tekrar</label>
        <p-password
          id="confirmPassword"
          formControlName="confirmPassword"
          [toggleMask]="true"
          [feedback]="false"
          styleClass="auth-password"
          inputStyleClass="auth-input"
          placeholder="Yeni şifrenizi tekrar giriniz"
        />
      </div>

      @if (passwordsDoNotMatch) {
        <p-message severity="error" text="Şifreler eşleşmiyor." styleClass="w-full" />
      }

      <p-button
        label="Şifreyi Güncelle"
        [loading]="isLoading"
        type="submit"
        [disabled]="resetPasswordForm.invalid || isLoading"
        styleClass="auth-submit"
      />

      <div class="auth-footer">
        <a routerLink="/login" class="auth-link">Giriş sayfasına dön</a>
      </div>
    </form>
  </div>
</div>
