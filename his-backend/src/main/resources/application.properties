# ===========================
# Application
# ===========================
spring.application.name=his-backend
server.port=8080

# ===========================
# PostgreSQL DataSource
# ===========================
spring.datasource.url=jdbc:postgresql://localhost:5432/his_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ===========================
# JPA / Hibernate
# ===========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===========================
# Flyway Database Migrations
# ===========================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.validate-on-migrate=true

# ===========================
# Logging
# ===========================
logging.level.com.his=DEBUG
logging.level.org.springframework.security=DEBUG

# ===========================
# JWT Configuration
# ===========================
# 256-bit secret key for HMAC-SHA256 (Base64 Encoded)
his.jwt.secret=${JWT_SECRET:aYp2s8vD4gK9fX1mP4jL7wN0zB3sC6xV9aT2hN5yR8E=}
# Expiration: 24 hours (in milliseconds)
his.jwt.expiration=86400000
