<div class="min-h-screen flex items-center justify-center bg-slate-100 px-4 py-8">
  <div class="w-full max-w-[430px] rounded-md border border-slate-200 bg-white shadow-xl">
    <div class="border-b border-slate-200 px-8 pb-7 pt-8 text-center">
      <div class="mx-auto mb-5 flex h-20 w-20 items-center justify-center rounded-full border border-cyan-100 bg-cyan-50 text-cyan-700">
        <i class="pi pi-building-columns text-4xl"></i>
      </div>
      <div class="text-xs font-semibold uppercase tracking-wide text-slate-500">Logo</div>
      <h1 class="mt-2 text-2xl font-extrabold leading-tight text-slate-900">Hospital Information System</h1>
      <div class="mt-4 text-lg font-bold text-cyan-800">Hasta Portalı</div>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-5 px-8 py-7">
      <div class="text-center text-base font-bold text-slate-800">Giriş Yap</div>

      @if (errorMessage) {
        <p-message severity="error" [text]="errorMessage" styleClass="w-full" />
      }

      <div class="flex flex-col gap-2">
        <label for="username" class="text-sm font-semibold text-slate-700">Ad Soyad / Kullanıcı Adı</label>
        <input
          pInputText
          id="username"
          formControlName="username"
          type="text"
          class="w-full !rounded-md !border-slate-300 !bg-white !p-3 !text-slate-900 placeholder:!text-slate-400 focus:!border-cyan-700 focus:!ring-1 focus:!ring-cyan-700"
          placeholder="Kullanıcı adınızı giriniz"
        />
      </div>

      <div class="flex flex-col gap-2">
        <label for="password" class="text-sm font-semibold text-slate-700">Şifre</label>
        <p-password
          id="password"
          formControlName="password"
          [toggleMask]="true"
          [feedback]="false"
          styleClass="w-full"
          inputStyleClass="w-full !rounded-md !border-slate-300 !bg-white !p-3 !text-slate-900 placeholder:!text-slate-400 focus:!border-cyan-700 focus:!ring-1 focus:!ring-cyan-700"
          placeholder="Şifrenizi Giriniz"
        />
      </div>

      <div class="flex items-center justify-between gap-3 text-sm">
        <div class="flex items-center gap-2">
          <p-checkbox formControlName="rememberMe" [binary]="true" inputId="remember" />
          <label for="remember" class="text-slate-600 text-sm cursor-pointer hover:text-slate-900 transition-colors">Beni Hatırla</label>
        </div>
        <a href="#" class="font-semibold text-cyan-700 hover:text-cyan-900">Şifremi Unuttum</a>
      </div>

      <p-button
        label="Giriş Yap"
        [loading]="isLoading"
        type="submit"
        [disabled]="loginForm.invalid"
        styleClass="w-full !mt-2 !rounded-md !border-none !bg-cyan-700 hover:!bg-cyan-800 !py-3 !text-base !font-bold"
      />

      <div class="flex flex-col items-center gap-3 border-t border-slate-200 pt-5 text-sm">
        <div class="text-slate-500">
          Hesabınız yok mu?
          <a href="#" class="font-extrabold text-cyan-800 hover:text-cyan-950">KAYIT OL</a>
        </div>
      </div>
    </form>
  </div>
</div>
