<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">
        <i class="pi pi-key"></i>
      </div>
      <div class="auth-brand-label">Logo</div>
      <h1>Hospital Information System</h1>
      <div class="auth-section-title">Şifremi Unuttum</div>
    </div>

    <form [formGroup]="forgotPasswordForm" (ngSubmit)="onSubmit()" class="auth-form">
      <p class="auth-help-text">
        Kayıtlı e-posta adresinizi giriniz. Şifre sıfırlama bağlantısı e-posta adresinize gönderilecektir.
      </p>

      @if (successMessage) {
        <p-message severity="success" [text]="successMessage" styleClass="w-full" />
      }

      @if (errorMessage) {
        <p-message severity="error" [text]="errorMessage" styleClass="w-full" />
      }

      <div class="auth-field">
        <label for="email">E-posta Adresi</label>
        <input
          pInputText
          id="email"
          formControlName="email"
          type="email"
          class="auth-input"
          placeholder="E-posta adresinizi giriniz"
        />
      </div>

      <p-button
        label="Sıfırlama Bağlantısı Gönder"
        [loading]="isLoading"
        type="submit"
        [disabled]="forgotPasswordForm.invalid"
        styleClass="auth-submit"
      />

      <div class="auth-footer">
        <a routerLink="/login" class="auth-link">Giriş sayfasına dön</a>
      </div>
    </form>
  </div>
</div>
