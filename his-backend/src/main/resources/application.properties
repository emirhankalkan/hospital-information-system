# ===========================
# Application
# ===========================
spring.application.name=his-backend
server.port=8080
spring.config.import=optional:file:.env[.properties]

# ===========================
# PostgreSQL DataSource
# ===========================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/his_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===========================
# JPA / Hibernate
# ===========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===========================
# Flyway Database Migrations
# ===========================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.validate-on-migrate=true

# ===========================
# Logging
# ===========================
logging.level.com.his=DEBUG
logging.level.org.springframework.security=DEBUG

# ===========================
# JWT Configuration
# ===========================
# 256-bit secret key for HMAC-SHA256 (Base64 Encoded)
his.jwt.secret=${JWT_SECRET:aYp2s8vD4gK9fX1mP4jL7wN0zB3sC6xV9aT2hN5yR8E=}
# Expiration: 24 hours (in milliseconds)
his.jwt.expiration=${JWT_EXPIRATION:86400000}
his.refresh-token.expiration=${REFRESH_TOKEN_EXPIRATION:604800000}
his.account.email-verification-expiration=${EMAIL_VERIFICATION_EXPIRATION:86400000}
his.account.password-reset-expiration=${PASSWORD_RESET_EXPIRATION:900000}
his.app.base-url=${APP_BASE_URL:http://localhost:8080}

# ===========================
# Mail
# ===========================
# Use "log" for local development without real e-mail, "smtp" for Gmail SMTP.
his.mail.provider=${MAIL_PROVIDER:log}
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
